<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YK6th Live Tour セトリ画像化アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html2canvas/dist/html2canvas.min.js"></script>
    
    <style>
        /* --- トリコロール背景用のカラーパレット（CSS変数） --- */
        :root {
            --color-primary: #ec6a2e;   
            --color-secondary: #f4e001; 
            --color-tertiary: #128a89;  
            --color-line: #222222;      
        }

        .taiban-song { color: #e70017 !important; background: #fff3f3;}

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #f5f5f5; 
            padding: 15px; 
            margin: 0; 
            color: #333; 
            padding-bottom: 80px;
        }

        /* --- 画面全体のレイアウト --- */
        .layout-wrapper {
            display: flex;              
            justify-content: center;    
            align-items: flex-start;    
            gap: 30px;                  
            max-width: 1100px;          
            margin: 0 auto;             
        }

        /* 画面が狭い場合（1050px以下）は縦並びに戻す */
        @media (max-width: 1050px) {
            .layout-wrapper {
                flex-direction: column; 
                align-items: center;    
            }
        }

        /* --- 1. 入力画面のスタイル --- */
        .container { 
            width: 100%; 
            max-width: 500px; 
            margin: 0; 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .radio-group label { font-weight: normal; margin: 0; font-size: 0.9rem; display: flex; align-items: center; }
        .radio-group input { margin-right: 4px; }
        
        .song-block { background: #f9f9f9; border: 1px solid #ddd; padding: 5px 10px; border-radius: 6px; margin-bottom: 15px; }
        
        .song-title-div { border-left: 3px solid #007bff; padding-left: 10px; margin-bottom: 10px; }
        .artist-name-div { margin-top: 8px; background: #fff3cd; padding: 8px; border-radius: 4px; border: 1px solid #ffeeba; }
        
        .singer-div { margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px; display: flex; align-items: center; gap: 10px; }
        .singer-div label { margin-bottom: 0; white-space: nowrap; }

        .hidden { display: none !important; }
        .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; text-align: center; margin-top: 10px; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; transition: 0.2s; }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; color: white; }
        
        .song-block-header { display: flex; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .song-block-title { font-weight: bold; margin-right: 15px; }
        .mode-select { font-size: 0.85rem; display: flex; gap: 15px; flex-wrap: wrap; }
        .mode-select label { font-weight: normal; margin: 0; display: inline-flex; align-items: center; }
        .mode-select input { margin-right: 4px; }
        .mode-select-separator { border-left: 1px solid #ccc; padding-left: 5px; }
        
        .remove-song-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; float: right; margin-top: 2px; }

        /* --- 2. 画像生成エリア（本番用：画面外へ非表示） --- */
        #setlistPreviewContainer {
            width: 500px; 
            flex-shrink: 0;
            background-color: #ffef31; 
            padding: 0; 
            box-sizing: border-box;
            color: #0F172A;
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            
            /* --- プレビューを画面外へ隠す --- */
            position: absolute;
            left: -9999px;
            top: 0;
        }

        .prev-inner {
            background-color: #FFFFFF;
            border: 3px solid #1E293B;
            border-radius: 16px;
            box-shadow: 6px 6px 0px #1E293B;
            padding: 15px;
            margin: 15px;
            flex-grow: 1;
        }

        .prev-header { 
            text-align: center; 
            border-bottom: 2px dashed rgba(30, 41, 59, 0.3); 
            padding-bottom: 12px; 
            margin-bottom: 12px; 
        }

        .prev-title { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: 0.05em;
            color: #1E293B; 
            margin-bottom: 12px; 
            line-height: 1.1; 
            background: linear-gradient(transparent 60%, rgba(255, 239, 49, 0.6) 60%);
            display: inline-block;
            padding: 0 8px;
        }

        .prev-taiban-w { 
            font-size: 15px; 
            font-weight: 900;
            color: #D2003B;
            border: 3px solid #D2003B;
            padding: 2px 12px;
            border-radius: 6px;
            transform: rotate(2deg);
            display: inline-block;
            letter-spacing: 0.1em;
            margin-top: -5px;
            background: rgba(255,255,255,0.9);
        }

        .prev-details { 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .prev-date-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prev-time-badge {
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .badge-day { background-color: #F97316; }
        .badge-night { background-color: #1E3A8A; }

        .prev-date-venue {
            background-color: #1E293B;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .prev-encore-label {
            align-self: flex-start;
            margin-top: 10px;
            margin-bottom: 0px;
        }

        .prev-song-list { 
            display: flex;
            flex-direction: column;
        }

        .prev-song-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 8px 0; 
            border-bottom: 1px dashed #E2E8F0; 
        }

        .prev-song-item:last-child { border-bottom: none; }

        .prev-song-num-badge {
            display: flex;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            border: 2px solid #1E293B;
            border-radius: 6px;
            box-shadow: 2px 2px 0px rgba(57, 143, 127, 0.8); 
            overflow: hidden;
            align-self: flex-start; 
            margin-top: 2px;
        }

        .prev-song-num-label {
            background-color: #FFFFFF;
            color: #1E293B;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            border-right: 2px solid #1E293B;
        }

        .prev-song-num-val {
            background-color: #398f7f;
            color: #FFFFFF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1.2;
        }

        .prev-song-content { 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prev-song-title { 
            font-size: 15px; 
            font-weight: 700; 
            color: #0F172A;
            line-height: 1.2;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .prev-extra-info { 
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .prev-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .badge-cover { color: #888888; }
        
        .badge-singer { 
            color: #FFFFFF;
            border: none;
            flex-shrink: 0; 
            text-align: center;
            line-height: 1.3;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .singer-main { background-color: #5a7bd3; } 
        .singer-enemy { background-color: #d64b73; } 
        .singer-collab { background-color: #9b5bd8; } 

        .footer {
            margin-top: auto;
            padding: 10px 15px;
            background-color: #1E293B; 
            text-align: center;
            flex-shrink: 0;
        }
        .footer-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 9px;
            color: #94A3B8; 
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        /* --- 3. 生成された画像の表示エリア --- */
        #generatedImageArea {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 10000;
            flex-direction: column; overflow-y: auto; padding: 20px 0;
        }
        #generatedImageArea img {
            max-width: 90%; max-height: 80%; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        #closeImageBtn { background: white; color: #333; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="container" id="inputContainer">
        <h1>セトリジェネレーター</h1>

        <div class="form-group">
            <label>公演タイトル</label>
            <select id="liveTitle" onchange="autoFillLiveInfo()">
                <option value="">-- 公演を選択してください --</option>
                <option value="駒形友梨6thライブツアー札幌">駒形友梨6thライブツアー札幌</option>
                <option value="駒形友梨6thライブツアー福岡">駒形友梨6thライブツアー福岡</option>
                <option value="駒形友梨6thライブツアー香川">駒形友梨6thライブツアー香川</option>
                <option value="駒形友梨6thライブツアー東京">駒形友梨6thライブツアー東京</option>
                <option value="駒形友梨6thライブツアー宮城">駒形友梨6thライブツアー宮城</option>
                <option value="駒形友梨6thライブツアー広島">駒形友梨6thライブツアー広島</option>
                <option value="駒形友梨6thライブツアー名古屋">駒形友梨6thライブツアー名古屋</option>
                <option value="駒形友梨6thライブツアー大阪">駒形友梨6thライブツアー大阪</option>
            </select>
        </div>
        <div class="form-group">
            <label>日時</label>
            <input type="date" id="liveDate">
        </div>
        <div class="form-group">
            <input type="text" id="liveVenue" placeholder="会場名">
        </div>
        
        <div class="form-group">
            <label>公演区分</label>
            <div class="radio-group">
                <label><input type="radio" name="liveTime" value="" checked>1日1公演</label>
                <label><input type="radio" name="liveTime" value="昼"> 昼公演</label>
                <label><input type="radio" name="liveTime" value="夜"> 夜公演</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>イベント形式</label>
            <div class="radio-group">
                <label><input type="radio" name="liveType" value="oneman" checked onclick="toggleLiveType()"> ワンマン</label>
                <label><input type="radio" name="liveType" value="taiban" onclick="toggleLiveType()"> 対バン</label>
            </div>
        </div>
        <div class="form-group hidden" id="taibanEnemyGroup">
            <label>対バン相手（アーティスト名）</label>
            <input type="text" id="taibanEnemy" placeholder="例: Machico" oninput="updateAllSingers()">
        </div>

        <hr>

        <div id="setlistContainer"></div>

        <button class="btn btn-secondary" onclick="addSongBlock()">＋ 曲を追加</button>
        <button class="btn btn-primary" style="margin-top: 30px; font-size: 1.2rem; padding: 15px;" onclick="generateSetlistImage()">
            画像を生成して保存
        </button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="#" style="color: #dc3545; font-size: 0.85rem; text-decoration: underline;" onclick="clearStorageData(); return false;">保存データをすべて削除して初期化</a>
        </div>
    </div>

    <div id="setlistPreviewContainer">
        <div class="prev-inner">
            <div class="prev-header">
                <div class="prev-title" id="prevLiveTitle">LIVE SETLIST</div>
                <div class="prev-details">
                    <span id="prevTaibanEnemy" class="prev-taiban-w" style="display:none;"></span>
                    <div class="prev-date-wrap">
                        <span id="prevLiveTimeBadge" class="prev-time-badge" style="display:none;"></span>
                        <span class="prev-date-venue" id="prevDateVenue"></span>
                    </div>
                </div>
            </div>
            <div class="prev-song-list" id="prevSongListArea"></div>
        </div>
        <div class="footer">
            <div class="footer-text">THIS IS AN UNOFFICIAL, FAN-MADE WORK. CREATED BY ナンプラー@nannpla</div>
        </div>
    </div>
</div>

<div id="generatedImageArea">
    <p style="color:white; margin-bottom:10px;">画像を長押しして保存してください</p>
    <div id="finalImagePlace"></div> 
    <button id="closeImageBtn" onclick="closeImageArea()">入力に戻る</button>
</div>

<script src="songList.js"></script>

<script>
const MAIN_ARTIST = "駒形友梨";

const tourData = {
    "駒形友梨6thライブツアー札幌": { date: "2026-06-20", venue: "札幌・プラント", type: "oneman", enemy: "" },
    "駒形友梨6thライブツアー福岡": { date: "2026-07-20", venue: "福岡ROOMS", type: "oneman", enemy: "" },
    "駒形友梨6thライブツアー香川": { date: "2026-07-26", venue: "高松DIME", type: "oneman", enemy: "" },
    "駒形友梨6thライブツアー東京": { date: "2026-08-01", venue: "SHIBYA PLEASURE PLEASURE", type: "taiban", enemy: "BURNOUT SYNDROMES" },
    "駒形友梨6thライブツアー宮城": { date: "2026-08-02", venue: "誰も知らない劇場", type: "oneman", enemy: "" },
    "駒形友梨6thライブツアー広島": { date: "2026-08-11", venue: "広島 Live space Reed", type: "oneman", enemy: "" },
    "駒形友梨6thライブツアー名古屋": { date: "2026-08-15", venue: "SPADE BOX", type: "taiban", enemy: "Machico" },
    "駒形友梨6thライブツアー大阪": { date: "2026-08-16", venue: "梅田Shangri-la", type: "taiban", enemy: "中島愛" },
};

let songCount = 0;
let isRestoring = false; // データ復元中の自動保存暴発を防ぐフラグ

function autoFillLiveInfo() {
    const title = document.getElementById('liveTitle').value;
    
    if (tourData[title]) {
        const data = tourData[title];
        document.getElementById('liveDate').value = data.date;
        document.getElementById('liveVenue').value = data.venue;
        const typeRadios = document.getElementsByName('liveType');
        typeRadios.forEach(radio => { radio.checked = (radio.value === data.type); });
        document.getElementById('taibanEnemy').value = data.enemy;
        toggleLiveType();
    }
    renderPreviewBeforeCapture(); // プルダウン切り替え後にプレビューと保存を実行
}

function toggleLiveType() {
    const isTaiban = document.querySelector('input[name="liveType"]:checked').value === 'taiban';
    const enemyGroup = document.getElementById('taibanEnemyGroup');
    enemyGroup.className = isTaiban ? 'form-group' : 'form-group hidden';
    updateAllSingers();
}

function addSongBlock() {
    songCount++;
    const container = document.getElementById('setlistContainer');
    const block = document.createElement('div');
    block.className = 'song-block';
    block.id = `songBlock_${songCount}`;
    
    let optionsHtml = '<option value="">-- 曲を選択 --</option>';
    songList.forEach(song => {
        const taibanClass = song.taibanFlag ? ' class="taiban-song"' : '';
        
        // --- 追加箇所: subInfoが存在する曲のみ、青色のインラインスタイルを付与 ---
        const subInfoStyle = song.subInfo ? ' style="color: #007bff;"' : '';
        
        const firstKana = song.kana.charAt(0);
        let displayName = "";
        
        if ("アカガサザタダナハバマヤラワ".includes(firstKana)) {
            displayName = `${firstKana}-&emsp;${song.name}`;
        } else {
            displayName = `-&emsp;&emsp;${song.name}`;
        }
        
        // --- 変更箇所: 生成するoptionタグに subInfoStyle を追加 ---
        optionsHtml += `<option value="${song.name}"${taibanClass}${subInfoStyle}>${displayName}</option>`;
    });

    block.innerHTML = `
        <button class="remove-song-btn" onclick="removeSongBlock(${songCount})">削除</button>
        <div class="song-block-header">
            <div class="song-block-title">M-${songCount}</div>
            <div class="mode-select">
                <label><input type="radio" name="mode_${songCount}" value="normal" checked onclick="toggleSongMode(${songCount})"> 持ち曲</label>
                <label><input type="radio" name="mode_${songCount}" value="cover" onclick="toggleSongMode(${songCount})"> カバー</label>
                
                <label class="mode-select-separator"><input type="checkbox" id="acoustic_${songCount}" onchange="renderPreviewBeforeCapture()"> アコ</label>
                <label><input type="checkbox" id="encore_${songCount}" onchange="renderPreviewBeforeCapture()"> En.</label>
            </div>
        </div>

        <div class="song-title-div" id="songTitleDiv_${songCount}">
            <select id="songSelect_${songCount}" onchange="renderPreviewBeforeCapture()">${optionsHtml}</select>
            <input type="text" id="songInput_${songCount}" class="hidden" placeholder="曲名を入力" oninput="renderPreviewBeforeCapture()">
            
            <div id="artistNameDiv_${songCount}" class="artist-name-div hidden">
                <label style="font-size:0.8rem; color:#856404; margin-bottom:2px;">アーティスト名（元曲）</label>
                <input type="text" id="artistName_${songCount}" placeholder="例: 坂本真綾" oninput="renderPreviewBeforeCapture()">
            </div>
        </div>

        <div class="singer-div hidden" id="singerDiv_${songCount}">
            <label>歌唱者</label>
            <select id="singerSelect_${songCount}" onchange="renderPreviewBeforeCapture()"></select>
        </div>
    `;
    container.appendChild(block);
    updateSingerOptions(songCount);
    renderPreviewBeforeCapture();
}

function removeSongBlock(id) {
    const block = document.getElementById(`songBlock_${id}`);
    if(block) { 
        block.remove(); 
        renderPreviewBeforeCapture();
    }
}

function toggleSongMode(id) {
    const mode = document.querySelector(`input[name="mode_${id}"]:checked`).value;
    const select = document.getElementById(`songSelect_${id}`);
    const input = document.getElementById(`songInput_${id}`);
    const artistDiv = document.getElementById(`artistNameDiv_${id}`);
    
    if (mode === 'cover') {
        select.classList.add('hidden'); input.classList.remove('hidden'); artistDiv.classList.remove('hidden');
    } else {
        select.classList.remove('hidden'); input.classList.add('hidden'); artistDiv.classList.add('hidden');
    }
    renderPreviewBeforeCapture();
}

function updateAllSingers() {
    const inputSongBlocks = document.querySelectorAll('#setlistContainer .song-block');
    inputSongBlocks.forEach(block => {
        const idNum = block.id.split('_')[1];
        updateSingerOptions(idNum);
    });
    renderPreviewBeforeCapture();
}

function updateSingerOptions(id) {
    const isTaiban = document.querySelector('input[name="liveType"]:checked').value === 'taiban';
    const singerDiv = document.getElementById(`singerDiv_${id}`);
    const singerSelect = document.getElementById(`singerSelect_${id}`);
    
    if (!singerDiv) return;

    if (isTaiban) {
        singerDiv.classList.remove('hidden');
        const enemy = document.getElementById('taibanEnemy').value || "対バン相手";
        singerSelect.innerHTML = `
            <option value="${MAIN_ARTIST}">${MAIN_ARTIST}</option>
            <option value="${enemy}">${enemy}</option>
            <option value="${MAIN_ARTIST}＆${enemy}">${MAIN_ARTIST} ＆ ${enemy}</option>
        `;
    } else {
        singerDiv.classList.add('hidden');
    }
}

function applyTricolorBackground() {
    let stops = [];
    for (let i = 0; i < 30; i++) {
        let o = i * 330;
        stops.push(`#ec6a2e ${o}px`, `#ec6a2e ${o + 100}px`);
        stops.push(`#222222 ${o + 100}px`, `#222222 ${o + 110}px`);
        stops.push(`#f4e001 ${o + 110}px`, `#f4e001 ${o + 190}px`);
        stops.push(`#222222 ${o + 190}px`, `#222222 ${o + 200}px`);
        stops.push(`#128a89 ${o + 200}px`, `#128a89 ${o + 300}px`);
        stops.push(`#222222 ${o + 300}px`, `#222222 ${o + 330}px`);
    }
    document.getElementById('setlistPreviewContainer').style.background = `linear-gradient(150deg, ${stops.join(', ')})`;
}

/* --- 新設: ローカルストレージへの自動保存関数 --- */
function saveCurrentData() {
    if (isRestoring) return; // 復元中は保存しない

    const data = {
        liveTitle: document.getElementById('liveTitle').value,
        liveDate: document.getElementById('liveDate').value,
        liveVenue: document.getElementById('liveVenue').value,
        liveTime: document.querySelector('input[name="liveTime"]:checked')?.value || "",
        liveType: document.querySelector('input[name="liveType"]:checked')?.value || "oneman",
        taibanEnemy: document.getElementById('taibanEnemy').value,
        songs: []
    };

    document.querySelectorAll('#setlistContainer .song-block').forEach(block => {
        const idNum = block.id.split('_')[1];
        const modeRadio = block.querySelector(`input[name="mode_${idNum}"]:checked`);
        const mode = modeRadio ? modeRadio.value : "normal";

        data.songs.push({
            mode: mode,
            acoustic: document.getElementById(`acoustic_${idNum}`).checked,
            encore: document.getElementById(`encore_${idNum}`).checked,
            songSelect: document.getElementById(`songSelect_${idNum}`).value,
            songInput: document.getElementById(`songInput_${idNum}`).value,
            artistName: document.getElementById(`artistName_${idNum}`).value,
            singerSelect: document.getElementById(`singerSelect_${idNum}`) ? document.getElementById(`singerSelect_${idNum}`).value : ""
        });
    });

    localStorage.setItem('yk6th_setlist_data', JSON.stringify(data));
}

/* --- 新設: ローカルストレージからのデータ復元関数 --- */
function loadSavedData() {
    const rawData = localStorage.getItem('yk6th_setlist_data');
    if (!rawData) return false;

    try {
        isRestoring = true; // 復元フラグON
        const data = JSON.parse(rawData);

        // 基本情報の復元
        document.getElementById('liveTitle').value = data.liveTitle || "";
        document.getElementById('liveDate').value = data.liveDate || "";
        document.getElementById('liveVenue').value = data.liveVenue || "";
        
        if (data.liveTime) {
            const radio = document.querySelector(`input[name="liveTime"][value="${data.liveTime}"]`);
            if (radio) radio.checked = true;
        }

        // イベント形式（ワンマン/対バン）の復元とUI切り替え
        if (data.liveType) {
            const radio = document.querySelector(`input[name="liveType"][value="${data.liveType}"]`);
            if (radio) radio.checked = true;
            toggleLiveType(); // 対バン枠の表示/非表示を切り替え
        }

        document.getElementById('taibanEnemy').value = data.taibanEnemy || "";
        updateAllSingers(); // 復元したゲスト名でプルダウンの選択肢を最新化する

        // 曲ブロック群の復元
        if (data.songs && data.songs.length > 0) {
            data.songs.forEach(song => {
                addSongBlock();
                const currentSongCount = songCount;

                // ラジオボタン(持ち曲/カバー)の復元
                const modeRadios = document.getElementsByName(`mode_${currentSongCount}`);
                modeRadios.forEach(radio => {
                    if (radio.value === song.mode) {
                        radio.checked = true;
                    }
                });
                toggleSongMode(currentSongCount); // UIを切り替え

                // 各種インプットの復元
                document.getElementById(`acoustic_${currentSongCount}`).checked = song.acoustic;
                document.getElementById(`encore_${currentSongCount}`).checked = song.encore;
                document.getElementById(`songSelect_${currentSongCount}`).value = song.songSelect || "";
                document.getElementById(`songInput_${currentSongCount}`).value = song.songInput || "";
                document.getElementById(`artistName_${currentSongCount}`).value = song.artistName || "";
                
                // 歌唱者（プルダウン）の復元
                if (song.singerSelect && document.getElementById(`singerSelect_${currentSongCount}`)) {
                    document.getElementById(`singerSelect_${currentSongCount}`).value = song.singerSelect;
                }
            });
        } else {
            // 曲データが空の場合は初期ブロックを15個作成
            for (let i = 0; i < 15; i++) { addSongBlock(); }
        }

        isRestoring = false; // 復元フラグOFF
        return true;
    } catch (e) {
        console.error("データの復元に失敗しました:", e);
        isRestoring = false;
        return false;
    }
}

/* --- 新設: データの一括クリア --- */
function clearStorageData() {
    if (confirm("保存されている入力データをすべて削除し、初期状態に戻しますか？")) {
        localStorage.removeItem('yk6th_setlist_data');
        window.location.reload(); 
    }
}

function renderPreviewBeforeCapture() {
    document.getElementById('prevLiveTitle').innerText = document.getElementById('liveTitle').value || 'LIVE SETLIST';
    
    const rawDate = document.getElementById('liveDate').value;
    const liveTime = document.querySelector('input[name="liveTime"]:checked').value;
    const venue = document.getElementById('liveVenue').value || '';
    
    let dateStr = "";
    if(rawDate){
        dateStr = rawDate.replace(/-/g, '/');
    }
    
    const timeBadge = document.getElementById('prevLiveTimeBadge');
    if (liveTime === "昼") {
        timeBadge.innerText = "昼の部";
        timeBadge.className = "prev-time-badge badge-day";
        timeBadge.style.display = "inline-block";
    } else if (liveTime === "夜") {
        timeBadge.innerText = "夜の部";
        timeBadge.className = "prev-time-badge badge-night";
        timeBadge.style.display = "inline-block";
    } else {
        timeBadge.style.display = "none";
    }
    
    if (dateStr && venue) {
        document.getElementById('prevDateVenue').innerText = dateStr + " ＠ " + venue;
    } else if (dateStr) {
        document.getElementById('prevDateVenue').innerText = dateStr;
    } else if (venue) {
        document.getElementById('prevDateVenue').innerText = venue;
    } else {
        document.getElementById('prevDateVenue').innerText = "";
    }
    
    if (!rawDate && !venue) {
        document.getElementById('prevDateVenue').style.display = 'none';
    } else {
        document.getElementById('prevDateVenue').style.display = 'inline-block';
    }
    
    const isTaiban = document.querySelector('input[name="liveType"]:checked').value === 'taiban';
    const enemyEl = document.getElementById('prevTaibanEnemy');
    if(isTaiban){
        const enemy = document.getElementById('taibanEnemy').value;
        enemyEl.innerText = enemy ? `w/ ${enemy}` : "w/ Guests";
        enemyEl.style.display = 'inline-block';
    } else {
        enemyEl.style.display = 'none';
    }

    const songListArea = document.getElementById('prevSongListArea');
    songListArea.innerHTML = "";
    
    const inputSongBlocks = document.querySelectorAll('#setlistContainer .song-block');
    let displayIndex = 1;

    inputSongBlocks.forEach((block) => {
        const idNum = block.id.split('_')[1];
        const modeRadio = block.querySelector(`input[name="mode_${idNum}"]:checked`);
        const mode = modeRadio ? modeRadio.value : "normal";
        
        const isAcoustic = document.getElementById(`acoustic_${idNum}`).checked;
        const isEncore = document.getElementById(`encore_${idNum}`).checked;
        
        let finalTitle = "";
        let coverArtist = "";

        if(mode === 'normal'){
            finalTitle = document.getElementById(`songSelect_${idNum}`).value;
            const selectedSongData = songList.find(s => s.name === finalTitle);
            if (selectedSongData && selectedSongData.subInfo) {
                coverArtist = selectedSongData.subInfo;
            }
        } else {
            finalTitle = document.getElementById(`songInput_${idNum}`).value;
            coverArtist = document.getElementById(`artistName_${idNum}`).value;
        }

        if (!finalTitle || finalTitle.trim() === "") {
            return;
        }

        if (isEncore) {
            const encoreDiv = document.createElement('div');
            encoreDiv.className = 'prev-date-venue prev-encore-label';
            encoreDiv.innerText = 'En.';
            songListArea.appendChild(encoreDiv);
        }
        
        let singer = "";
        if(isTaiban){
            singer = document.getElementById(`singerSelect_${idNum}`).value;
        }

        const songItem = document.createElement('div');
        songItem.className = 'prev-song-item';
        
        const badgeDiv = document.createElement('div');
        badgeDiv.className = 'prev-song-num-badge';
        badgeDiv.innerHTML = `
            <div class="prev-song-num-val">${displayIndex.toString().padStart(2, '0')}</div>
        `;
        songItem.appendChild(badgeDiv);
        
        const songContentDiv = document.createElement('div');
        songContentDiv.className = 'prev-song-content';
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'prev-song-title';
        titleSpan.innerText = finalTitle;
        
        if (isAcoustic) {
            const acousticBadge = document.createElement('span');
            acousticBadge.className = 'prev-badge badge-cover';
            acousticBadge.innerText = '(アコースティックver.)';
            titleSpan.appendChild(acousticBadge);
        }
        
        songContentDiv.appendChild(titleSpan);
        
        let extraInfoHtml = "";
        if(coverArtist){
            extraInfoHtml += `<span class="prev-badge badge-cover">${coverArtist}</span>`;
        }

        if(extraInfoHtml){
            const extraDiv = document.createElement('div');
            extraDiv.className = 'prev-extra-info';
            extraDiv.innerHTML = extraInfoHtml;
            songContentDiv.appendChild(extraDiv);
        }
        songItem.appendChild(songContentDiv);

        if(isTaiban && singer){
            const singerBadge = document.createElement('div');
            
            let singerClass = 'singer-enemy'; 
            if (singer === MAIN_ARTIST) {
                singerClass = 'singer-main';  
            } else if (singer.includes('＆')) {
                singerClass = 'singer-collab'; 
            }
            
            singerBadge.className = `prev-badge badge-singer ${singerClass}`;
            
            const formattedSinger = singer.replace('＆', '＆<br>');
            singerBadge.innerHTML = formattedSinger;
            
            songItem.appendChild(singerBadge);
        }

        songListArea.appendChild(songItem);
        displayIndex++;
    });
    
    saveCurrentData(); // プレビューが更新されるたびにローカルストレージへ保存する
    return displayIndex > 1;
}

function generateSetlistImage() {
    const hasSongs = renderPreviewBeforeCapture();
    
    if (!hasSongs) {
        alert("曲が入力されていません。1曲以上入力してください。");
        return;
    }

    const previewArea = document.getElementById('setlistPreviewContainer');
    
    previewArea.style.position = 'fixed';
    previewArea.style.left = '0';
    previewArea.style.zIndex = '-1';

    html2canvas(previewArea, {
        scale: 2,
        logging: false,
        useCORS: true
    }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");

        const finalImg = document.createElement('img');
        finalImg.src = imgData;
        finalImg.alt = "Generated Setlist";
        
        const placeHolder = document.getElementById('finalImagePlace');
        placeHolder.innerHTML = "";
        placeHolder.appendChild(finalImg);
        
        document.getElementById('generatedImageArea').style.display = 'flex';
        
        previewArea.style.position = 'absolute';
        previewArea.style.left = '-9999px';
        
    }).catch(err => {
        alert("画像の生成に失敗しました。");
        console.error(err);
        
        previewArea.style.position = 'absolute';
        previewArea.style.left = '-9999px';
    });
}

function closeImageArea() {
    document.getElementById('generatedImageArea').style.display = 'none';
}

document.getElementById('liveTitle').addEventListener('change', renderPreviewBeforeCapture);
document.getElementById('liveDate').addEventListener('input', renderPreviewBeforeCapture);
document.getElementById('liveVenue').addEventListener('input', renderPreviewBeforeCapture);
document.querySelectorAll('input[name="liveTime"]').forEach(radio => radio.addEventListener('change', renderPreviewBeforeCapture));
document.querySelectorAll('input[name="liveType"]').forEach(radio => radio.addEventListener('change', renderPreviewBeforeCapture));
document.getElementById('taibanEnemy').addEventListener('input', renderPreviewBeforeCapture);

/* --- 修正: ページ読み込み時にデータの復元を試みる --- */
window.onload = function() {
    applyTricolorBackground();

    const isLoaded = loadSavedData(); 
    
    // 過去の保存データがない場合のみ、デフォルトで15曲分の入力枠を生成する
    if (!isLoaded) {
        for (let i = 0; i < 15; i++) {
            addSongBlock();
        }
    }
    
    renderPreviewBeforeCapture(); 
};
</script>
